name: Deploy CRM to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~/Consumer-Relationship-Management-System
            git config pull.rebase false
            git pull origin main
            mvn clean package -DskipTests
            pkill -f "java -jar" || true
            sleep 2
            nohup java -jar target/CRM-0.0.1-SNAPSHOT.jar \
              --spring.datasource.url="jdbc:mysql://127.0.0.1:3306/crm?allowPublicKeyRetrieval=true&useSSL=false" \
              --spring.datasource.username=root \
              --spring.datasource.password=coderslab \
              --server.port=7777 > ~/app.log 2>&1 &
            disown $!
            sleep 5
            echo "Deploy tugadi!"
